spring:
  application:
    name: Lingyu-AppCraft
  # session 配置
  session:
    # session 30 天过期
    timeout: 2592000
    #连接数据库
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/yang_ai-code?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
    username: root
    password: admin123456
    # redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
# 自定义 Redis 配置
app:
  redis:
    ttl: 3600
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.lingyu.lingyuappcraft.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: sk-1fa43fcd2f794dfaa661928bfab2be68
      model-name: deepseek-chat
      log-requests: true
      log-responses: true
      max-tokens: 8192
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: sk-1fa43fcd2f794dfaa661928bfab2be68
      model-name: deepseek-chat
      max-tokens: 8192
      log-requests: true
      log-responses: true



